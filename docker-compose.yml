# =============================================================================
# ClaudeBridge — Local Development Only
# =============================================================================
# Production Synapse runs on Railway. This file is for local dev/testing.
# To deploy to Railway, use: ./scripts/deploy-railway.sh

services:
  synapse:
    build:
      context: ./synapse
      dockerfile: Dockerfile
    container_name: claudebridge-synapse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8008:8008"
    volumes:
      - synapse-data:/data
    environment:
      SYNAPSE_REGISTRATION_SECRET: ${SYNAPSE_REGISTRATION_SECRET:-changeme}
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  synapse-data:
